<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actions Practice — Live!</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .card {
      text-align: center;
      padding: 3rem;
      border: 1px solid #30363d;
      border-radius: 16px;
      background: #161b22;
    }
    h1 { margin: 0 0 .5rem; }
    .badge { color: #3fb950; font-weight: bold; }
    code { background: #21262d; padding: .15rem .4rem; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 Deployed by GitHub Actions</h1>
    <p>This page went live through a full <span class="badge">CI/CD</span> pipeline.</p>
    <p>test → build → deploy to GitHub Pages</p>
    <p>Built from <code>public/index.html</code></p>
  </div>
</body>
</html>
