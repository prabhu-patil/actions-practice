name: Secure

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
    secure-build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608  # v4.1.0
        - uses: actions/setup-node@v5
          with:
            node-version: '20'
        - run: npm ci
        - run: npm test