name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
     - uses: actions/checkout@v5        # puts your repo files on the runner
     - uses: actions/setup-node@v5
       with:                            # 'with' = inputs passed to the action
        node-version: ${{ matrix.node-version }}
     - run: npm ci                      # 'ci' = clean install from package-lock.json
     - run: npm test
      