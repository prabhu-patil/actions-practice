name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
     - uses: actions/checkout@v5        # puts your repo files on the runner
     - uses: actions/setup-node@v5
       with:                            # 'with' = inputs passed to the action
        node-version: ${{ matrix.node-version }}
     - run: npm ci                      # 'ci' = clean install from package-lock.json
     - run: npm test
     - name: use a secret
       env:
        TOKEN: ${{ secrets.MY_SECRET }}
       run: echo " secret length is ${#TOKEN}"
     
     - uses: actions/setup-node@v5
       with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
     - name: Make a report
       run: echo "Tests passed on Node ${{ matrix.node-version }}!" > report.txt
     - name: Upload report
       uses: actions/upload-artifact@v4
       with:
        name: report-node-${{ matrix.node-version }}
        path: report.txt
        
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v5
     - uses: actions/setup-node@v5
       with:
        node-version: '20'
        cache: 'npm'
     - run: npm ci
     - run: echo "Building the project..." # replace with actual build command
     
     - run : echo "Build successfully!"
     
     - name: Only on main branch
       if: github.ref == 'refs/heads/main'
       run: echo "This runs only on the main branch."
       
     - name: Runs even if something failed
       if: failure()
       run: echo "The previous steps failed."  