name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v5        # puts your repo files on the runner

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:                            # 'with' = inputs passed to the action
          node-version: '20'

      - name: Install dependencies
        run: npm ci                      # 'ci' = clean install from package-lock.json

      - name: Run tests
        run: npm test
