name: Use Composite

on: workflow_dispatch     # manual only — click "Run workflow" in the Actions tab

jobs:
    test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v5       # needed first, so the action file exists on the runner
        - uses: ./.github/actions/setup-and-install   # YOUR action, by folder path
          with:
            node-version: '20'
        - run: npm test